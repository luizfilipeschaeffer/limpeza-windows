name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build executables
        shell: powershell
        run: |
          .\scripts\build-limpeza.ps1 -Edition Standard
          .\scripts\build-limpeza.ps1 -Edition CleanCode

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = if ($env:GITHUB_REF_NAME) { $env:GITHUB_REF_NAME } else { '${{ github.ref_name }}' }
          if ($tag -like 'refs/tags/*') {
            $tag = $tag.Substring('refs/tags/'.Length)
          }

          $assets = @(
            'dist/LimpezaWindows.exe',
            'dist/LimpezaWindows-CleanCode.exe'
          )

          foreach ($asset in $assets) {
            if (-not (Test-Path $asset)) {
              Write-Warning "Asset ausente (sera ignorado): $asset"
            }
          }

          $presentAssets = @($assets | Where-Object { Test-Path $_ })
          if ($presentAssets.Count -eq 0) {
            throw 'Nenhum executavel foi gerado pelo build.'
          }

          if (-not (Test-Path 'RELEASE_NOTES.md')) {
            @"
          ## Limpeza Avancada do Windows $tag

          - ``LimpezaWindows.exe`` (edicao Standard)
          - ``LimpezaWindows-CleanCode.exe`` (edicao Clean Code, fluxo linear)
          - Elevacao automatica (UAC)

          ### Como usar

          1. Baixe o executavel da edicao desejada
          2. Execute como Administrador

          Repositorio: https://github.com/${{ github.repository }}
          "@ | Out-File -FilePath RELEASE_NOTES.md -Encoding utf8
          }

          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release $tag ja existe. Atualizando assets..."
            foreach ($asset in $presentAssets) {
              gh release upload $tag $asset --clobber
            }
          } else {
            gh release create $tag @presentAssets `
              --title "Limpeza Avancada do Windows $tag" `
              --notes-file RELEASE_NOTES.md
          }
